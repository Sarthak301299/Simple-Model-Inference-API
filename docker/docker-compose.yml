version: '3.8'

services:
  model-api:
    image: simple-model-inference-api:cpu
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/cpu.txt
    container_name: simple-model-inference-api-container
    ports:
      - "8000:8000"
    env_file:
      - path: ../.env
        required: false
    environment:
      # Container network topology — intentionally fixed, and takes precedence over
      # env_file: a laptop-dev .env with API_HOST=localhost would otherwise make this
      # container unreachable despite the published port mapping.
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - PYTHONPATH=/app/src
      - HF_HOME=/home/modelapi/.cache/huggingface
      # Fixed to match this image's installed dependencies: requirements/cpu.txt has
      # no CUDA-enabled torch wheels, so this must stay "cpu" regardless of .env.
      # docker-compose.gpu.yml overrides this to "cuda" for the GPU image, which does
      # have CUDA wheels installed.
      - INFERENCE_DEVICE=cpu
      # Everything else (MODEL_NAME, MAX_BATCH_SIZE, API_KEY, ...) comes from
      # ../.env via env_file — add/change values there, no edits needed here.
    volumes:
      - model-cache:/home/modelapi/.cache/huggingface
      - ../models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health/live', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  model-cache:
    driver: local
