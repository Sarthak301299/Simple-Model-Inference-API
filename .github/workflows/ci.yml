name: Inference API CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Basic Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7
      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements/dev.txt
      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install -r requirements/dev.txt
      - name: Static Formatting Check
        uses: psf/black@stable
        with:
          options: "--check --diff"
          src: "src tests"
      - name: Lint check
        uses: astral-sh/ruff-action@v4.0.0
        with:
          src: "src tests"
      - name: Type check
        uses: jakebailey/pyright-action@v3
      - name: Unit & Coverage Tests
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80
      - name: Security Audit
        run: pip-audit
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: success()
    permissions:
      issues: write
      contents: read
    steps:
      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: Sarthak301299
          minimum-approvals: 1
          issue-title: "Manual Approval Required for Docker Build"
          issue-body: "Please approve or deny the deployment."
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image
        run: docker build -f docker/Dockerfile -t simple-model-inference-api:cpuci .
