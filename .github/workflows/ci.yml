name: Inference API CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Basic Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: '0.11.28'
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --extra cpu --dev
      - name: Static Formatting Check
        uses: psf/black@stable
        with:
          options: "--check --diff"
          src: "src tests"
      - name: Lint check
        uses: astral-sh/ruff-action@v4.0.0
        with:
          src: "src tests"
      - name: Type check
        uses: jakebailey/pyright-action@v3
      - name: Unit & Coverage Tests
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80
      - name: Security Audit
        run: uv audit
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: success()
    permissions:
      issues: write
      contents: read
    steps:
      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: Sarthak301299
          minimum-approvals: 1
          issue-title: "Manual Approval Required for Docker Build"
          issue-body: "Please approve or deny the deployment."
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          tags: simple-model-inference-api:cpuci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
