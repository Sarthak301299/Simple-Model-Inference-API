name: Inference API CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Basic Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install -r requirements/dev.txt
      - name: Static Formatting Check
        run: black --check src tests
      - name: Lint check
        run: ruff check src tests
      - name: Type check
        run: pyright
      - name: Unit & Coverage Tests
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80
      - name: Security Audit
        run: pip-audit
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: Sarthak301299
          minimum-approvals: 1
          issue-title: "Manual Approval Required for Docker Build"
          issue-body: "Please approve or deny the deployment."
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image
        run: docker build -f docker/Dockerfile -t simple-model-inference-api:cpuci .
